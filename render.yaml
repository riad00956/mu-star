services:
  - type: web
    name: stars-gift-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: BOT_TOKEN
        sync: false          # You'll set this manually in Render dashboard
      - key: ADMIN_IDS
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.12
    healthCheckPath: /health
    autoDeploy: true
